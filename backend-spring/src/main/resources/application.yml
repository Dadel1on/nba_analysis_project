server:
  port: 8080

spring:
  application:
    name: backend-spring
  datasource:
    url: jdbc:mysql://master:3306/nba_stats?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 60000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
    show-sql: false
  sql:
    init:
      mode: never

logging:
  level:
    root: INFO

app:
  spark:
    enabled: true
    submit-command: ssh -o BatchMode=yes hadoop@192.168.203.10 /usr/local/spark/bin/spark-submit --master spark://192.168.203.10:7077 --jars /home/hadoop/mysql-connector-java-8.0.30.jar /home/hadoop/spark_nba_ml.py
    working-dir: ${APP_SPARK_WORKING_DIR:.}
    timeout-seconds: ${APP_SPARK_TIMEOUT_SECONDS:1800}
    output-path: ${APP_SPARK_OUTPUT_PATH:target/spark_predictions}
